<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Программирование на языке PHP</title>
</head>
<body>

	<h1>Отправка данных на сервер</h1>
	<h2>Загрузка файлов</h2>
	<hr>
	<h2>Добавить информацию о группе</h2>

	<form method="post" action="server.php" enctype="multipart/form-data">
		Название: <input type="text" name="name"><p>
		Алиас: <input type="text" name="alias"><p>
		Страна: <input type="text" name="country"><p>
		Дата основания: <input type="text" name="date"><p>
		Стиль: <input type="text" name="style"><p>
		Контент: <textarea name="content"></textarea><p>
		Изображение: <input type="file" name="image"><p>
		
		<input type="submit" name="loader" value="Загрузить файл">
	</form>


</body>
</html>
